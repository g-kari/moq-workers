<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoQ 配信</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Reddit+Sans:ital,wdth,wght@0,75..100,200..900;1,75..100,200..900&family=IBM+Plex+Sans+JP:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-bg: #fefbfb;
        --color-text: #483030;
        --color-muted: #a39696;
        --color-border: #dfd7d7;
        --color-surface: #f2f0f0;
        --color-accent: #73862d;
        --color-danger: #ff340b;
        --font: "Reddit Sans", "IBM Plex Sans JP", BlinkMacSystemFont, sans-serif;
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
        --transition: all 0.4s var(--ease);
        --max-w: 768px;
        --radius: 12px;
        --radius-sm: 8px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html { scroll-behavior: smooth; }

      body {
        font-family: var(--font);
        font-size: 16px;
        color: var(--color-text);
        background: var(--color-bg);
        line-height: 1.65;
        -webkit-font-smoothing: antialiased;
        min-height: 100dvh;
      }

      a { color: inherit; text-decoration: none; }
      button { cursor: pointer; font-family: var(--font); border: none; }

      /* ---- Header ---- */
      #site-header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--color-bg);
        border-bottom: 1px solid var(--color-border);
      }
      .header-inner {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 0 1.25rem;
        min-height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        font-size: 1rem;
        color: var(--color-text);
        white-space: nowrap;
        flex-shrink: 0;
        transition: var(--transition);
      }
      .logo:hover { opacity: 0.75; }

      /* ---- Layout ---- */
      main {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 2rem 1.25rem 4rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }

      /* ---- Card ---- */
      .card {
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      /* ---- Form ---- */
      .form-group { display: flex; flex-direction: column; gap: 6px; }
      .form-group label { font-size: 0.875rem; font-weight: 500; color: var(--color-muted); }
      .form-group input {
        padding: 10px 14px;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        font-family: var(--font);
        font-size: 0.95rem;
        color: var(--color-text);
        transition: border-color 0.2s;
        outline: none;
        width: 100%;
      }
      .form-group input:focus { border-color: var(--color-accent); }

      /* ---- Buttons ---- */
      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 22px;
        background: var(--color-text);
        color: var(--color-bg);
        border-radius: var(--radius-sm);
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        transition: var(--transition);
        white-space: nowrap;
      }
      .btn-primary:hover:not(:disabled) { opacity: 0.85; }
      .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
      .btn-primary.btn-full { width: 100%; }

      .btn-ghost {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 16px;
        background: transparent;
        color: var(--color-muted);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        font-size: 0.875rem;
        font-weight: 500;
        transition: var(--transition);
        white-space: nowrap;
      }
      .btn-ghost:hover { color: var(--color-text); background: var(--color-surface); }
      .btn-ghost.btn-sm { padding: 6px 12px; font-size: 0.8rem; }

      /* ---- Status ---- */
      .status { font-size: 0.875rem; color: var(--color-muted); min-height: 1.25rem; }
      .status.error { color: var(--color-danger); }
      .status.success { color: var(--color-accent); }

      /* ---- Share box ---- */
      .share-box {
        display: none;
        flex-direction: column;
        gap: 0.6rem;
        padding-top: 0.25rem;
      }
      .share-box.visible { display: flex; }
      .share-box-label { font-size: 0.8rem; font-weight: 500; color: var(--color-muted); }
      .share-row { display: flex; gap: 0.5rem; align-items: flex-start; }
      .share-url {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
        font-size: 0.8rem;
        color: var(--color-muted);
        word-break: break-all;
        flex: 1;
        line-height: 1.5;
      }

      /* ---- Publisher UI ---- */
      moq-publish-ui {
        display: none;
        width: 100%;
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--color-border);
      }
      moq-publish-ui.visible { display: block; }
    </style>
  </head>
  <body>
    <header id="site-header">
      <div class="header-inner">
        <a href="/" class="logo">
          <span>🔴</span>
          <span>MoQ 配信</span>
        </a>
        <a href="/watch.html" class="btn-ghost btn-sm">📺 視聴する</a>
      </div>
    </header>

    <main>
      <div class="card">
        <div class="form-group">
          <label for="apiKey">API キー</label>
          <input id="apiKey" type="password" placeholder="dev-secret-key" value="dev-secret-key" />
        </div>
        <div class="form-group">
          <label for="roomName">ルーム名</label>
          <input id="roomName" type="text" placeholder="配信タイトル" value="テスト配信" />
        </div>
        <button id="startBtn" class="btn-primary btn-full">ルームを作成して配信開始</button>
        <p id="status" class="status"></p>

        <div id="shareBox" class="share-box">
          <p class="share-box-label">視聴 URL（共有してください）</p>
          <div class="share-row">
            <div id="shareUrl" class="share-url"></div>
            <button class="btn-ghost btn-sm" id="copyBtn">コピー</button>
          </div>
        </div>
      </div>

      <moq-publish-ui id="publisherUi">
        <moq-publish id="publisher" source="camera">
          <video muted autoplay></video>
        </moq-publish>
      </moq-publish-ui>
    </main>

    <script type="module" src="/src/publish.ts"></script>
  </body>
</html>
