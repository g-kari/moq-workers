<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoQ 配信</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Reddit+Sans:ital,wdth,wght@0,75..100,200..900;1,75..100,200..900&family=IBM+Plex+Sans+JP:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-bg: #fefbfb;
        --color-text: #483030;
        --color-muted: #a39696;
        --color-border: #dfd7d7;
        --color-surface: #f2f0f0;
        --color-accent: #73862d;
        --color-danger: #ff340b;
        --font: "Reddit Sans", "IBM Plex Sans JP", BlinkMacSystemFont, sans-serif;
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
        --transition: all 0.4s var(--ease);
        --max-w: 768px;
        --radius: 12px;
        --radius-sm: 8px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html { scroll-behavior: smooth; }

      body {
        font-family: var(--font);
        font-size: 16px;
        color: var(--color-text);
        background: var(--color-bg);
        line-height: 1.65;
        -webkit-font-smoothing: antialiased;
        min-height: 100dvh;
      }

      a { color: inherit; text-decoration: none; }
      button { cursor: pointer; font-family: var(--font); border: none; }

      /* ---- Header ---- */
      #site-header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--color-bg);
        border-bottom: 1px solid var(--color-border);
      }
      .header-inner {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 0 1.25rem;
        min-height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        font-size: 1rem;
        color: var(--color-text);
        white-space: nowrap;
        flex-shrink: 0;
        transition: var(--transition);
      }
      .logo:hover { opacity: 0.75; }

      /* ---- Layout ---- */
      main {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 2rem 1.25rem 4rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }

      /* ---- Card ---- */
      .card {
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      /* ---- Form ---- */
      .form-group { display: flex; flex-direction: column; gap: 6px; }
      .form-group label { font-size: 0.875rem; font-weight: 500; color: var(--color-muted); }
      .form-group input {
        padding: 10px 14px;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        font-family: var(--font);
        font-size: 0.95rem;
        color: var(--color-text);
        transition: border-color 0.2s;
        outline: none;
        width: 100%;
      }
      .form-group input:focus { border-color: var(--color-accent); }

      /* ---- Buttons ---- */
      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 22px;
        background: var(--color-text);
        color: var(--color-bg);
        border-radius: var(--radius-sm);
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        transition: var(--transition);
        white-space: nowrap;
      }
      .btn-primary:hover:not(:disabled) { opacity: 0.85; }
      .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
      .btn-primary.btn-full { width: 100%; }

      .btn-ghost {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 16px;
        background: transparent;
        color: var(--color-muted);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        font-size: 0.875rem;
        font-weight: 500;
        transition: var(--transition);
        white-space: nowrap;
      }
      .btn-ghost:hover { color: var(--color-text); background: var(--color-surface); }
      .btn-ghost.btn-sm { padding: 6px 12px; font-size: 0.8rem; }

      /* ---- Status ---- */
      .status { font-size: 0.875rem; color: var(--color-muted); min-height: 1.25rem; }
      .status.error { color: var(--color-danger); }
      .status.success { color: var(--color-accent); }

      /* ---- Share box ---- */
      .share-box {
        display: none;
        flex-direction: column;
        gap: 0.6rem;
        padding-top: 0.25rem;
      }
      .share-box.visible { display: flex; }
      .share-box-label { font-size: 0.8rem; font-weight: 500; color: var(--color-muted); }
      .share-row { display: flex; gap: 0.5rem; align-items: flex-start; }
      .share-url {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
        font-size: 0.8rem;
        color: var(--color-muted);
        word-break: break-all;
        flex: 1;
        line-height: 1.5;
      }

      /* ---- Publisher UI ---- */
      moq-publish-ui {
        display: none;
        width: 100%;
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--color-border);
        background: #1a1510; /* コンポーネント内部はダーク背景 */
      }
      moq-publish-ui.visible { display: block; }

      /* ---- Debug Panel ---- */
      #debugPanel {
        font-size: 0.78rem;
        font-family: "IBM Plex Mono", "Fira Code", monospace;
        background: #1a1510;
        color: #e8d5c0;
        border: 1px solid #3a2a20;
        border-radius: var(--radius);
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        line-height: 1.6;
      }
      #debugPanel .dbg-title {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #a08060;
        border-bottom: 1px solid #3a2a20;
        padding-bottom: 0.4rem;
        margin-bottom: 0.2rem;
      }
      #debugPanel .dbg-row { display: flex; gap: 0.5rem; }
      #debugPanel .dbg-key { color: #a08060; min-width: 160px; flex-shrink: 0; }
      #debugPanel .dbg-val { color: #e8d5c0; word-break: break-all; }
      #debugPanel .dbg-val.ok { color: #8fb05a; }
      #debugPanel .dbg-val.err { color: #ff6b4a; }
      #debugPanel .dbg-val.warn { color: #e8b840; }
    </style>
  </head>
  <body>
    <header id="site-header">
      <div class="header-inner">
        <a href="/" class="logo">
          <span>🔴</span>
          <span>MoQ 配信</span>
        </a>
        <a href="/watch.html" class="btn-ghost btn-sm">📺 視聴する</a>
      </div>
    </header>

    <main>
      <div class="card">
        <div class="form-group">
          <label for="apiKey">API キー</label>
          <input id="apiKey" type="password" placeholder="dev-secret-key" value="dev-secret-key" />
        </div>
        <div class="form-group">
          <label for="roomName">ルーム名</label>
          <input id="roomName" type="text" placeholder="配信タイトル" value="テスト配信" />
        </div>
        <button id="startBtn" class="btn-primary btn-full">ルームを作成して配信開始</button>
        <p id="status" class="status"></p>

        <div id="shareBox" class="share-box">
          <p class="share-box-label">視聴 URL（共有してください）</p>
          <div class="share-row">
            <div id="shareUrl" class="share-url"></div>
            <button class="btn-ghost btn-sm" id="copyBtn">コピー</button>
          </div>
        </div>
      </div>

      <moq-publish-ui id="publisherUi">
        <moq-publish id="publisher" source="camera">
          <video muted autoplay></video>
        </moq-publish>
      </moq-publish-ui>

      <!-- デバッグパネル：すべての状態を表示 -->
      <div id="debugPanel">
        <div class="dbg-title">🔍 デバッグ情報 (500ms 更新)</div>

        <div class="dbg-row"><span class="dbg-key">API Base:</span><span class="dbg-val" id="dbg-api"></span></div>
        <div class="dbg-row"><span class="dbg-key">Room ID:</span><span class="dbg-val" id="dbg-roomId">-</span></div>
        <div class="dbg-row"><span class="dbg-key">Pub Token URL:</span><span class="dbg-val" id="dbg-pubUrl">-</span></div>
        <div class="dbg-row"><span class="dbg-key">Sub Token URL:</span><span class="dbg-val" id="dbg-subUrl">-</span></div>

        <div class="dbg-title" style="margin-top:0.4rem">moq-publish 属性</div>
        <div class="dbg-row"><span class="dbg-key">url attr:</span><span class="dbg-val" id="dbg-pubAttrUrl">-</span></div>
        <div class="dbg-row"><span class="dbg-key">name attr:</span><span class="dbg-val" id="dbg-pubAttrName">-</span></div>
        <div class="dbg-row"><span class="dbg-key">source attr:</span><span class="dbg-val" id="dbg-pubAttrSource">-</span></div>

        <div class="dbg-title" style="margin-top:0.4rem">コンポーネント内部状態</div>
        <div class="dbg-row"><span class="dbg-key">broadcast obj:</span><span class="dbg-val" id="dbg-broadcastObj">-</span></div>
        <div class="dbg-row"><span class="dbg-key">connection:</span><span class="dbg-val" id="dbg-conn">-</span></div>
        <div class="dbg-row"><span class="dbg-key">broadcast keys:</span><span class="dbg-val" id="dbg-broadcastKeys">-</span></div>
        <div class="dbg-row"><span class="dbg-key">publisher keys:</span><span class="dbg-val" id="dbg-publisherKeys">-</span></div>

        <div class="dbg-title" style="margin-top:0.4rem">WebTransport / QUIC</div>
        <div class="dbg-row"><span class="dbg-key">WebTransport:</span><span class="dbg-val" id="dbg-wt">-</span></div>
        <div class="dbg-row"><span class="dbg-key">UserAgent:</span><span class="dbg-val" id="dbg-ua">-</span></div>
      </div>
    </main>

    <script type="module" src="/src/publish.ts"></script>
    <script type="module">
      // デバッグパネル更新
      const dbg = (id, val, cls) => {
        const el = document.getElementById("dbg-" + id);
        if (!el) return;
        el.textContent = val ?? "-";
        if (cls) el.className = "dbg-val " + cls;
        else el.className = "dbg-val";
      };

      document.getElementById("dbg-api").textContent = "https://moq-workers.0g0.workers.dev";
      document.getElementById("dbg-ua").textContent = navigator.userAgent;
      document.getElementById("dbg-wt").textContent =
        typeof WebTransport !== "undefined" ? "利用可能 ✓" : "利用不可 ✗";
      document.getElementById("dbg-wt").className =
        "dbg-val " + (typeof WebTransport !== "undefined" ? "ok" : "err");

      // publish.ts が設定する値を window 経由で受け取る
      window.__dbgUpdate = (roomId, pubUrl, subUrl) => {
        dbg("roomId", roomId, "ok");
        dbg("pubUrl", pubUrl ? pubUrl.substring(0, 60) + "…" : "-", pubUrl ? "ok" : "err");
        dbg("subUrl", subUrl ? subUrl.substring(0, 60) + "…" : "-", subUrl ? "ok" : "err");
      };

      setInterval(() => {
        const publisher = document.getElementById("publisher");
        if (!publisher) return;

        dbg("pubAttrUrl", publisher.getAttribute("url") ? publisher.getAttribute("url").substring(0, 60) + "…" : "-",
          publisher.getAttribute("url") ? "ok" : null);
        dbg("pubAttrName", publisher.getAttribute("name"));
        dbg("pubAttrSource", publisher.getAttribute("source"));

        // コンポーネント内部状態を探索
        const bc = publisher.broadcast;
        if (bc) {
          dbg("broadcastObj", "存在する ✓", "ok");
          dbg("broadcastKeys", Object.keys(bc).join(", "));
          try {
            const conn = bc.connection?.get?.();
            dbg("conn", conn ?? "(get()なし)", conn ? "ok" : "warn");
          } catch(e) {
            dbg("conn", "エラー: " + e.message, "err");
          }
        } else {
          dbg("broadcastObj", "未設定 (属性待ち)", "warn");
          dbg("broadcastKeys", "-");
          dbg("conn", "-");
        }

        const pub = publisher.publisher;
        if (pub) {
          dbg("publisherKeys", Object.keys(pub).join(", "));
        } else {
          dbg("publisherKeys", "-");
        }
      }, 500);
    </script>
  </body>
</html>
