<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoQ 配信</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, sans-serif;
        background: #0f0f0f;
        color: #e8e8e8;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem;
      }

      h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 2rem; color: #fff; }

      .card {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 1.5rem;
        width: 100%;
        max-width: 520px;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      label { font-size: 0.8rem; color: #999; display: block; margin-bottom: 4px; }

      input {
        width: 100%;
        padding: 0.6rem 0.8rem;
        background: #111;
        border: 1px solid #333;
        border-radius: 8px;
        color: #e8e8e8;
        font-size: 0.95rem;
        outline: none;
      }
      input:focus { border-color: #555; }

      button {
        padding: 0.65rem 1.2rem;
        border-radius: 8px;
        border: none;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      button:hover:not(:disabled) { opacity: 0.85; }

      .btn-primary { background: #e53e3e; color: #fff; width: 100%; }
      .btn-copy { background: #2a2a2a; color: #e8e8e8; font-size: 0.85rem; padding: 0.4rem 0.8rem; }

      .share-box {
        display: none;
        flex-direction: column;
        gap: 0.6rem;
      }
      .share-box.visible { display: flex; }

      .share-url {
        background: #111;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 0.6rem 0.8rem;
        font-size: 0.8rem;
        color: #aaa;
        word-break: break-all;
        flex: 1;
      }

      .share-row { display: flex; gap: 0.5rem; align-items: flex-start; }

      .status { font-size: 0.8rem; color: #888; }
      .status.error { color: #fc8181; }

      moq-publish {
        display: none;
        width: 100%;
        max-width: 520px;
        margin-top: 1.5rem;
        border-radius: 12px;
        overflow: hidden;
      }
      moq-publish.visible { display: block; }
    </style>
  </head>
  <body>
    <h1>🔴 MoQ 配信</h1>

    <div class="card">
      <div>
        <label>API キー</label>
        <input id="apiKey" type="password" placeholder="dev-secret-key" value="dev-secret-key" />
      </div>
      <div>
        <label>ルーム名</label>
        <input id="roomName" type="text" placeholder="配信タイトル" value="テスト配信" />
      </div>
      <button id="startBtn" class="btn-primary">ルームを作成して配信開始</button>
      <p id="status" class="status"></p>

      <div id="shareBox" class="share-box">
        <label>視聴 URL（共有してください）</label>
        <div class="share-row">
          <div id="shareUrl" class="share-url"></div>
          <button class="btn-copy" id="copyBtn">コピー</button>
        </div>
      </div>
    </div>

    <moq-publish id="publisher" name="live"></moq-publish>

    <script type="module" src="/src/publish.ts"></script>
  </body>
</html>
